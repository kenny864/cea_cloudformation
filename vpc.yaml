AWSTemplateFormatVersion: "2010-09-09"
Description: "Cloudformation for VPC"

Resources:
  # My VPC
  MyVPC:
    Type: "AWS::EC2::VPC"
    Properties:
      CidrBlock: "150.12.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: MyVPC

  # Public Subnet in AZ 1
  PublicSubnet1A:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: PublicSubnet1A

  # App Private Subnet in AZ 1
  AppSubnet1A:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.2.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
      - Key: Name
        Value: AppPrivateSubnet1A

  # Database Private Subnet in AZ 1
  DatabaseSubnet1A:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.3.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
      - Key: Name
        Value: DbPrivateSubnet1A

  # Public Subnet in AZ 2
  PublicSubnet1B:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.4.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
      - Key: Name
        Value: PublicSubnet1B

  # App Private Subnet in AZ 2
  AppSubnet1B:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.5.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
      - Key: Name
        Value: AppPrivateSubnet1B

  # Database Private Subnet in AZ 2
  DatabaseSubnet1B:
    Type: "AWS::EC2::Subnet"
    Properties:
      VpcId: !Ref MyVPC
      CidrBlock: "150.12.6.0/24"
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
      - Key: Name
        Value: DbPrivateSubnet1B

  # Internet Gateway
  InternetGateway:
    Type: "AWS::EC2::InternetGateway"
    Properties:
      Tags:
      - Key: Name
        Value: MyVPC-IGW

  # Attach IGW to VPC
  AttachInternetGatewayToVPC:
    Type: "AWS::EC2::VPCGatewayAttachment"
    Properties:
      VpcId: !Ref MyVPC
      InternetGatewayId: !Ref InternetGateway

  # Public Route Tables
  PublicRouteTable:
    Type: "AWS::EC2::RouteTable"
    Properties:
      VpcId: !Ref MyVPC
      Tags:
      - Key: Name
        Value: PublicRouteTable

  # Routes
  PublicRoute:
    Type: "AWS::EC2::Route"
    DependsOn: AttachInternetGatewayToVPC
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Public Subnet 1A Route Table Association
  PublicSubnet1ARouteTableAssociation:
    Type: "AWS::EC2::SubnetRouteTableAssociation"
    Properties:
      SubnetId: !Ref PublicSubnet1A
      RouteTableId: !Ref PublicRouteTable
  
  # Public Subnet 1B Route Table Association
  PublicSubnet1BRouteTableAssociation:
    Type: "AWS::EC2::SubnetRouteTableAssociation"
    Properties:
      SubnetId: !Ref PublicSubnet1B
      RouteTableId: !Ref PublicRouteTable

  # Bastion KeyPair
  BastionKeyPair:
    Type: "AWS::EC2::KeyPair"
    Properties:
      KeyName: "BastionKey"
      Tags:
        - Key: Name
          Value: BastionKey

  # Bastion Security Group
  BastionSG:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Enable SSH access"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 71.126.242.120/32

  # Bastion Host EC2
  BastionHost:
    Type: "AWS::EC2::Instance"
    DependsOn: BastionKeyPair
    Properties: 
      InstanceType: t3.micro
      KeyName: !Ref BastionKeyPair
      ImageId: ami-0a59ec92177ec3fad
      SubnetId: !Ref PublicSubnet1A
      SecurityGroupIds:
        - !Ref BastionSG
      Tags:
        - Key: Name
          Value: BastionHost

  # App 1A Security Group
  App1ASG:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Enable SSH access from Bastion"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          SourceSecurityGroupId: !Ref BastionSG

  # App Instance 1A
  AppInstance1A:
    Type: "AWS::EC2::Instance"
    DependsOn: App1ASG
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref BastionKeyPair
      ImageId: ami-0a59ec92177ec3fad
      SubnetId: !Ref AppSubnet1A
      SecurityGroupIds:
        - !Ref App1ASG
      Tags:
        - Key: Name
          Value: AppInstance1A
        
  # App 1B Security Group
  App1BSG:
    Type: "AWS::EC2::SecurityGroup"
    Properties:
      GroupDescription: "Enable ICMP Ping from App 1"
      VpcId: !Ref MyVPC
      SecurityGroupIngress:
        - IpProtocol: icmp
          FromPort: -1
          ToPort: -1
          SourceSecurityGroupId: !Ref App1ASG

  # App Instance 1B
  AppInstance1B:
    Type: "AWS::EC2::Instance"
    DependsOn: App1BSG
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref BastionKeyPair
      ImageId: ami-0a59ec92177ec3fad
      SubnetId: !Ref AppSubnet1B
      SecurityGroupIds:
        - !Ref App1BSG
      Tags:
        - Key: Name
          Value: AppInstance1B